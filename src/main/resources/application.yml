spring:
  application:
    name: iticket
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000

server:
  port: 8090

app:
  security:
    jwt:
      secret: "ZmFrZS1zZWNyZXQta2V5LWZvci1wcm9qZWN0LWFjYWNpYS1ldmVudC10aWNrZXRpbmctc3lzdGVtLTIwMjY="
      access-token-ttl-minutes: 120
      refresh-token-ttl-days: 14
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@iticket.az}}
    mock: ${MAIL_MOCK:false}
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:5174,http://localhost:3000"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:iticket;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/iticket
    username: iticket
    password: iticket
  jpa:
    hibernate:
      ddl-auto: validate
